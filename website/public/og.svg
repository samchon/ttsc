  <text x="916.5" y="824" fill="#0b2b55" font-family="Arial, sans-serif" font-size="54" font-weight="700" text-anchor="middle" dominant-baseline="central">LSP</text>

  <!-- Right benefit tiles -->
  <rect x="1100" y="0" width="674" height="296" fill="#ffffff" stroke="#1264d8" stroke-width="2"/>
  <rect x="1100" y="296" width="674" height="295" fill="#0b2b55" stroke="#1264d8" stroke-width="2"/>
  <rect x="1100" y="591" width="674" height="296" fill="#1264d8" stroke="#1264d8" stroke-width="2"/>

  <!-- Speedometer -->
  <g fill="none" stroke="#1264d8" stroke-width="10" stroke-linecap="square">
    <path d="M1182 207 A88 88 0 1 1 1338 207"/>
    <path d="M1198 119 L1212 132 M1248 91 V112 M1302 119 L1288 132 M1325 165 L1305 169 M1195 165 L1215 169"/>
    <path d="M1260 165 L1305 122"/>
    <circle cx="1260" cy="165" r="13" fill="#1264d8"/>
  </g>
  <text x="1415" y="102" fill="#1264d8" font-family="Arial, sans-serif" font-size="110" font-weight="800" dominant-baseline="central">10x</text>
  <text x="1415" y="190" fill="#0b2b55" font-family="Arial, sans-serif" font-size="46" font-weight="700" dominant-baseline="central">faster than</text>
  <text x="1415" y="246" fill="#1264d8" font-family="Arial, sans-serif" font-size="46" font-weight="700" dominant-baseline="central">ts-node</text>

  <!-- Claude Code token graph -->
  <g fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
    <path d="M1260 369 V515 M1260 398 L1198 487 M1260 398 L1322 487"/>
    <circle cx="1260" cy="369" r="15" fill="#0b2b55"/>
    <circle cx="1198" cy="487" r="15" fill="#0b2b55"/>
    <circle cx="1260" cy="515" r="15" fill="#0b2b55"/>
    <circle cx="1322" cy="487" r="15" fill="#0b2b55"/>
  </g>
  <text x="1415" y="387" fill="#ffffff" font-family="Arial, sans-serif" font-size="110" font-weight="800" dominant-baseline="central">10x</text>
  <text x="1415" y="475" fill="#ffffff" font-family="Arial, sans-serif" font-size="46" font-weight="700" dominant-baseline="central">Fewer tokens</text>
  <text x="1415" y="531" fill="#8fc5ff" font-family="Arial, sans-serif" font-size="46" font-weight="700" dominant-baseline="central">Claude Code</text>

  <!-- Lint speed -->
  <path d="M1267 633 L1194 751 H1249 L1225 843 L1328 706 H1273 Z" fill="none" stroke="#ffffff" stroke-width="13" stroke-linejoin="miter"/>
  <text x="1415" y="682" fill="#ffffff" font-family="Arial, sans-serif" font-size="110" font-weight="800" dominant-baseline="central">800x</text>
  <text x="1415" y="770" fill="#ffffff" font-family="Arial, sans-serif" font-size="46" font-weight="700" dominant-baseline="central">faster than</text>
  <text x="1415" y="826" fill="#8fc5ff" font-family="Arial, sans-serif" font-size="46" font-weight="700" dominant-baseline="central">ESLint</text>
</svg>
