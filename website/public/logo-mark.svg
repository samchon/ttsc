<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none" stroke="currentColor" color="#22d3ee" aria-label="ttsc">
  <!-- ttsc mark: chevron + check.
       The chevron (>) reads as "forward / compile".
       The check sits inside the chevron's opening, encoding
       "TypeScript that compiles checked". -->
  <rect x="8" y="8" width="240" height="240" rx="40" ry="40" stroke="currentColor" stroke-width="6" opacity="0.18"/>
  <!-- chevron: pointing right, stroked -->
  <path d="M70 64 L150 128 L70 192" stroke="currentColor" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- checkmark: sits in the chevron's mouth, slightly forward -->
  <path d="M118 138 L150 170 L206 102" stroke="currentColor" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
