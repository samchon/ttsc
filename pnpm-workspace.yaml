packages:
  - 'config'
  - 'packages/*'
  - 'tests/*'
  - 'website'
catalogs:
  typescript:
    typescript: 7.0.1-rc
  typescript-legacy:
    # Native TypeScript 7 drops the classic JS compiler API, so the legacy v6
    # compiler is retained for `typescript-eslint` (peer `typescript <6.1.0`,
    # exposed as `typescript`) and for `@rollup/plugin-typescript` / the factory
    # parity oracle (exposed as the `ts-legacy` alias).
    typescript: ~6.0.3
    ts-legacy: 'npm:typescript@~6.0.3'
  rollup:
    '@rollup/plugin-commonjs': ^29.0.0
    '@rollup/plugin-node-resolve': ^16.0.3
    rollup: ^4.56.0
    rollup-plugin-auto-external: ^2.0.0
    rollup-plugin-node-externals: ^8.1.2
  utils:
    '@nestia/e2e': ^11.2.0
    '@types/node': ^25.3.0
    rimraf: ^6.1.2
