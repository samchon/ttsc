packages:
  - 'config'
  - 'packages/*'
  - 'tests/*'
  - 'website'
catalogs:
  typescript:
    typescript: ^7.0.2
    # Native TypeScript 7 drops the classic JS compiler API, so the legacy v6
    # compiler is retained under the `ts-legacy` alias for
    # `@rollup/plugin-typescript`, `typescript-eslint`, and the factory parity
    # oracle.
    ts-legacy: 'npm:typescript@~6.0.3'
  rollup:
    '@rollup/plugin-commonjs': ^29.0.0
    '@rollup/plugin-node-resolve': ^16.0.3
    rollup: ^4.56.0
  samchon:
    typia: &typia ^13.2.0
    '@typia/interface': *typia
    '@typia/mcp': *typia
    '@typia/utils': *typia
  utils:
    '@nestia/e2e': ^12.0.0
    '@types/node': ^25.3.0
    rimraf: ^6.1.2
