name: test

on:
  pull_request:
    paths:
      - ".github/workflows/test.yml"
      - "config/**"
      - "experimental/**"
      - "scripts/**"
      - "packages/**"
      - "tests/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"

concurrency:
  group: test-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    env:
      # 매 매트릭스 잡이 build:current(=tsgo 포함 ttsc 콜드 go build)와 소스
      # 플러그인 빌드를 반복한다. 전용 GOCACHE와 플러그인 바이너리 캐시를 run
      # 간 보존해(아래 actions/cache), go.sum 불변이면 증분 빌드가 되고 소스
      # 플러그인은 재사용된다.
      GOCACHE: ${{ runner.temp }}/ttsc-gocache
      TTSC_CACHE_DIR: ${{ runner.temp }}/ttsc-plugin-cache
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: go, run: "pnpm run test:go && pnpm --filter ttsc go:vet" }
          - { name: typecheck, run: "pnpm run check:flags && pnpm run test:typecheck" }
          - { name: banner, run: "pnpm --filter @ttsc/test-banner start" }
          - { name: lint, run: "pnpm --filter @ttsc/test-lint start" }
          - { name: paths, run: "pnpm --filter @ttsc/test-paths start" }
          - { name: strip, run: "pnpm --filter @ttsc/test-strip start" }
          - { name: ttsc, run: "pnpm --filter @ttsc/test-ttsc start" }
          - { name: unplugin, run: "pnpm --filter @ttsc/test-unplugin start" }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - uses: actions/setup-go@v5
        with:
          go-version-file: packages/ttsc/go.mod
          cache-dependency-path: |
            packages/ttsc/go.sum
            tests/go-transformer/go.mod

      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.4

      - name: Cache ttsc go-build + source-plugin binaries
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.temp }}/ttsc-gocache
            ${{ runner.temp }}/ttsc-plugin-cache
          key: ttsc-build-${{ matrix.name }}-${{ runner.os }}-${{ hashFiles('packages/ttsc/go.sum', 'packages/ttsc/**/*.go') }}
          restore-keys: |
            ttsc-build-${{ matrix.name }}-${{ runner.os }}-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Use System Go For Source Plugin Tests
        run: echo "TTSC_GO_BINARY=$(go env GOROOT)/bin/go" >> "$GITHUB_ENV"

      - name: Build Current Platform
        run: pnpm run build:current

      - name: Run ${{ matrix.name }}
        run: ${{ matrix.run }}
