name: test

on:
  pull_request:
    paths:
      - ".github/workflows/test.yml"
      - "config/**"
      - "experimental/**"
      - "scripts/**"
      - "packages/**"
      - "tests/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"

jobs:
  Ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - uses: actions/setup-go@v5
        with:
          go-version-file: packages/ttsc/go.mod
          cache-dependency-path: |
            packages/ttsc/go.sum
            tests/go-transformer/go.mod

      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.4

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Use System Go For Source Plugin Tests
        run: echo "TTSC_GO_BINARY=$(go env GOROOT)/bin/go" >> "$GITHUB_ENV"

      - name: Run Tests
        run: pnpm test

      - name: Go Vet
        run: pnpm --filter ttsc go:vet
