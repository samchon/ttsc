name: benchmark

# Refresh website/public/benchmark.json by sweeping the full benchmark
# matrix across GitHub-hosted runners and committing the merged result.
#
# Pipeline:
#
#   prepare       — emit the JSON matrix of projects based on the trigger
#                   / dispatch inputs
#   pack          — pack the local ttsc / @ttsc/lint / platform tarballs
#                   once and upload them as a shared artifact
#   measure (× 7) — one job per fixture; inside each job the bench runs
#                   `legacy → ttsc → ttsc-lint` *sequentially on the same
#                   runner* so the comparison numbers that the dashboard
#                   actually shows (ttsc vs tsc, ttsc-lint vs eslint) come
#                   from one physical machine. Cross-fixture rows
#                   (`vue` vs `rxjs`) are independent and unaffected by
#                   running on different runners. Each job uploads its
#                   partial `report.json` as `bench-<project>`.
#   publish       — download all partials, merge them into the website
#                   JSON via experimental/benchmark/merge-website.mjs,
#                   and commit & push the result to master
#
# Why not also fan out by branch? The previous (project × branch)
# 21-job matrix scattered the within-fixture comparisons across three
# different ubuntu-latest VMs, so a noisy host on the `ttsc` runner
# could turn into a phantom regression vs the `legacy` runner. Keeping
# the three branches on one runner is the single biggest knob for
# cross-row comparability inside a fixture.
#
# Triggers:
#   - push to master that touches pnpm-workspace.yaml (catalog version of
#     @typescript/native-preview shifts the comparison surface)
#   - GitHub release published
#   - pull_request touching benchmark plumbing — matrix collapses to
#     vue × 3 branches with `--verify-only`, publish is gated off
#   - manual dispatch with optional `projects` / `verify_only` inputs

on:
  push:
    branches:
      - master
    paths:
      - pnpm-workspace.yaml
  release:
    types: [published]
  pull_request:
    paths:
      - .github/workflows/benchmark.yml
      - experimental/benchmark/**
  workflow_dispatch:
    inputs:
      projects:
        description: 'Comma-separated projects to measure (empty = all 7)'
        required: false
        default: ''
      verify_only:
        description: 'Run --verify-only (one pass per cell, no timing, no publish)'
        required: false
        default: 'false'

permissions:
  contents: write
  # The publish job dispatches `.github/workflows/website.yml` after pushing
  # benchmark.json so the dashboard redeploys with fresh data. GITHUB_TOKEN
  # pushes by design do not trigger downstream workflows (anti-loop
  # guardrail), so we need an explicit `gh workflow run` and the
  # `actions: write` scope to let that call succeed.
  actions: write

concurrency:
  group: benchmark-${{ github.event_name == 'pull_request' && github.head_ref || 'master' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  TTSC_BENCH_SKIP_LOAD_CHECK: '1'
  PUPPETEER_SKIP_DOWNLOAD: '1'
  PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: '1'
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
  CYPRESS_INSTALL_BINARY: '0'
  HUSKY: '0'

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      projects_json: ${{ steps.matrix.outputs.projects_json }}
      verify_only: ${{ steps.matrix.outputs.verify_only }}
    steps:
      - id: matrix
        env:
          EVENT: ${{ github.event_name }}
          INPUT_PROJECTS: ${{ inputs.projects }}
          INPUT_VERIFY_ONLY: ${{ inputs.verify_only }}
        run: |
          set -euo pipefail
          all_projects=(vue rxjs typeorm zod nestjs vscode shopping-backend)
          case "$EVENT" in
            pull_request)
              projects=(vue)
              verify_only=true
              ;;
            workflow_dispatch)
              if [ -n "${INPUT_PROJECTS:-}" ]; then
                IFS=',' read -ra projects <<<"$INPUT_PROJECTS"
                for i in "${!projects[@]}"; do
                  projects[$i]="$(echo "${projects[$i]}" | xargs)"
                done
              else
                projects=("${all_projects[@]}")
              fi
              verify_only="${INPUT_VERIFY_ONLY:-false}"
              ;;
            *)
              projects=("${all_projects[@]}")
              verify_only=false
              ;;
          esac
          json='['
          sep=''
          for p in "${projects[@]}"; do
            json+="${sep}\"$p\""
            sep=','
          done
          json+=']'
          echo "projects_json=$json" >> "$GITHUB_OUTPUT"
          echo "verify_only=$verify_only" >> "$GITHUB_OUTPUT"
          echo "projects: $json"
          echo "verify_only: $verify_only"

  pack:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || 'master' }}
          fetch-depth: 1
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - uses: actions/setup-go@v5
        with:
          go-version-file: packages/ttsc/go.mod
          cache-dependency-path: packages/ttsc/go.sum
      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.4
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Pack ttsc tarballs
        env:
          TTSC_BENCH_TGZ: ${{ runner.temp }}/ttsc-tgz
        run: node experimental/benchmark/bench.mjs --pack-only
      - uses: actions/upload-artifact@v4
        with:
          name: ttsc-tarballs
          path: ${{ runner.temp }}/ttsc-tgz
          retention-days: 1
          if-no-files-found: error

  measure:
    needs: [prepare, pack]
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJSON(needs.prepare.outputs.projects_json) }}
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || 'master' }}
          fetch-depth: 1
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - uses: actions/setup-go@v5
        with:
          go-version-file: packages/ttsc/go.mod
          cache-dependency-path: packages/ttsc/go.sum
      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.4
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: ttsc-tarballs
          path: ${{ runner.temp }}/ttsc-tgz
      - name: Measure ${{ matrix.project }}
        env:
          TTSC_BENCH_SEQUENTIAL: '1'
          TTSC_BENCH_TGZ: ${{ runner.temp }}/ttsc-tgz
          TTSC_BENCH_SKIP_PACK: '1'
          VERIFY_ONLY: ${{ needs.prepare.outputs.verify_only }}
          PROJECT: ${{ matrix.project }}
        run: |
          set -euo pipefail
          # One job, one fixture, all three branches in series. `--sequential`
          # iterates `legacy → ttsc → ttsc-lint` on this single runner, so the
          # per-row comparisons the dashboard exposes (ttsc vs tsc, ttsc-lint
          # vs eslint) all use the same physical machine and the same OS
          # / CPU scheduling moment.
          args=(
            --sequential
            "--project=$PROJECT"
            --no-website
            --no-pack
            --allow-missing
            --reset
          )
          if [ "$VERIFY_ONLY" = "true" ]; then
            args+=(--verify-only)
          fi
          echo "running: node experimental/benchmark/bench.mjs ${args[*]}"
          node experimental/benchmark/bench.mjs "${args[@]}"
      - name: Upload partial report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-${{ matrix.project }}
          path: experimental/benchmark/.work/report.json
          if-no-files-found: ignore
          retention-days: 7

  publish:
    needs: [prepare, measure]
    if: |
      always()
      && github.event_name != 'pull_request'
      && needs.prepare.outputs.verify_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/partials
          pattern: bench-*
      - name: Merge partials into website/public/benchmark.json
        run: |
          node experimental/benchmark/merge-website.mjs \
            "${{ runner.temp }}/partials" \
            website/public/benchmark.json
      - name: Commit & push benchmark.json
        id: commit
        run: |
          if git diff --quiet -- website/public/benchmark.json; then
            echo "website/public/benchmark.json unchanged; nothing to commit"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add website/public/benchmark.json
          # No `[skip ci]` tag — the benchmark workflow's `push` trigger is
          # already pinned to `paths: [pnpm-workspace.yaml]`, so a
          # benchmark.json-only commit cannot re-enter this workflow.
          git commit -m "chore(benchmark): refresh website/public/benchmark.json"
          git push origin HEAD:master
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Redeploy dashboard
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # The push above used GITHUB_TOKEN, which by GitHub's anti-loop
        # guardrail does not trigger downstream workflows like website.yml.
        # `workflow_dispatch` is the explicit escape hatch; it works with
        # GITHUB_TOKEN as long as the calling workflow holds `actions: write`.
        run: gh workflow run website.yml --ref master
