<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" fill="none" aria-label="ttsc">
  <!-- ttsc full lockup: mark + wordmark.
       Mark: cyan chevron + check. Wordmark: white monospace "ttsc". -->

  <!-- mark, scaled into 56x56 at top-left -->
  <g transform="translate(4 4) scale(0.21875)" stroke="#22d3ee" fill="none">
    <rect x="8" y="8" width="240" height="240" rx="40" ry="40" stroke-width="6" opacity="0.18"/>
    <path d="M70 64 L150 128 L70 192" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M118 138 L150 170 L206 102" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- wordmark: "ttsc" -->
  <text x="76" y="44"
        font-family="ui-monospace, SFMono-Regular, 'JetBrains Mono', Menlo, Consolas, monospace"
        font-size="40"
        font-weight="700"
        letter-spacing="-1.2"
        fill="currentColor">ttsc</text>
</svg>
